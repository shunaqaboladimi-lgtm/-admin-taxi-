<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weak Taxi - Boshqaruv Paneli</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        :root { --tg-theme-bg-color: #000000; --taxi-yellow: #f2ba1d; }
        body { background-color: #000; color: #fff; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card { background: rgba(255, 255, 255, 0.05); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
        .taxi-yellow { color: var(--taxi-yellow); }
        .bg-taxi-yellow { background-color: var(--taxi-yellow); }
        .tab-btn { font-size: 11px; font-weight: 800; letter-spacing: 1px; color: #666; transition: 0.3s; padding-bottom: 8px; border-bottom: 2px solid transparent; }
        .tab-active { color: var(--taxi-yellow); border-bottom-color: var(--taxi-yellow); }
        .btn-primary { background: var(--taxi-yellow); color: #000; font-weight: 800; border-radius: 16px; padding: 12px; font-size: 12px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-item { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body class="p-5">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-black tracking-tighter">BOSHQARUV</h1>
            <p class="text-[10px] taxi-yellow font-bold uppercase tracking-[0.2em]">Weak Taxi Pro</p>
        </div>
        <div class="bg-zinc-900 px-3 py-1.5 rounded-full flex items-center space-x-2 border border-white/5">
            <div class="h-1.5 w-1.5 bg-green-500 rounded-full"></div>
            <span class="text-[9px] font-bold opacity-70">ONLINE</span>
        </div>
    </div>

    <!-- Stats -->
    <div class="card p-6 mb-8 border-none bg-gradient-to-br from-zinc-900 to-black">
        <div class="flex justify-between items-start mb-6">
            <div>
                <p class="text-[10px] font-bold text-zinc-500 uppercase mb-1">Umumiy kassa</p>
                <h2 id="totalRev" class="text-3xl font-black tracking-tighter">24,500,000 <span class="text-xs font-bold text-zinc-600">UZS</span></h2>
            </div>
            <div class="h-10 w-10 bg-zinc-800 rounded-xl flex items-center justify-center">
                <i class="fa-solid fa-wallet taxi-yellow"></i>
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 border-t border-white/5 pt-6">
            <div>
                <p class="text-[8px] font-bold text-zinc-500 uppercase mb-1">Sizning foyda</p>
                <p class="text-lg font-black tracking-tight">2,450,000 <span class="text-[10px]">sum</span></p>
            </div>
            <div class="text-right">
                <p class="text-[8px] font-bold text-zinc-500 uppercase mb-1">Haydovchilar</p>
                <p class="text-lg font-black text-green-500 tracking-tight">12 TA FAOL</p>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="flex justify-between border-b border-white/5 mb-8 no-scrollbar overflow-x-auto">
        <button onclick="switchTab('a')" id="ta" class="tab-btn tab-active">ARIZALAR</button>
        <button onclick="switchTab('d')" id="td" class="tab-btn">PARK</button>
        <button onclick="switchTab('s')" id="ts" class="tab-btn">SOS</button>
        <button onclick="switchTab('r')" id="tr" class="tab-btn">RADIO</button>
    </div>

    <!-- Content -->
    <div id="main-view" class="space-y-4 pb-24"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const botToken = '8899143978:AAEQcCgPHJkunL_kt31Vm8jhas8HpZKS-uQ';
        const chatId = '-1003713177314';

        function switchTab(t) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('t'+t).classList.add('tab-active');
            render(t);
            tg.HapticFeedback.impactOccurred('light');
        }

        function render(t) {
            const view = document.getElementById('main-view');
            if(t === 'a') {
                view.innerHTML = `
                    <div class="card p-5 border-yellow-500/10 animate-item">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <p class="font-bold text-sm uppercase">Asadbek Yo'ldoshev</p>
                                <p class="text-[10px] text-zinc-500 font-bold">+998 90 123 45 67</p>
                            </div>
                            <span class="bg-yellow-500/10 text-yellow-500 px-2 py-1 rounded text-[8px] font-black uppercase">Yangi</span>
                        </div>
                        <div class="bg-black/50 p-4 rounded-2xl border border-white/5 mb-5">
                            <p class="text-[10px] text-zinc-500 font-bold mb-1 uppercase">Mashina:</p>
                            <p class="text-xs font-semibold italic text-zinc-300 leading-relaxed">"Chevrolet Cobalt, 2024, To'q ko'k, 01 A 001 AA"</p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="tg.showAlert('Tasdiqlandi!')" class="flex-1 btn-primary uppercase tracking-widest">TASDIQLASH</button>
                            <button onclick="tg.showAlert('O\\'chirildi')" class="px-6 bg-zinc-800 rounded-2xl text-[10px] font-bold text-red-500 uppercase">Rad etish</button>
                        </div>
                    </div>`;
            } else if(t === 'd') {
                view.innerHTML = `
                    <div class="card p-4 flex justify-between items-center animate-item">
                        <div class="flex items-center space-x-4">
                            <div class="h-10 w-10 bg-zinc-800 rounded-full flex items-center justify-center"><i class="fa-solid fa-user-ninja taxi-yellow text-sm"></i></div>
                            <div>
                                <p class="font-bold text-xs uppercase">Sardor Azimov</p>
                                <p class="text-[9px] text-zinc-500">Nexia 3 | 120,000 sum</p>
                            </div>
                        </div>
                        <button class="text-red-500/30 text-[9px] font-black uppercase">O'chirish</button>
                    </div>`;
            } else if(t === 'r') {
                view.innerHTML = `
                    <div class="card p-6 animate-item">
                        <p class="text-[10px] font-black taxi-yellow tracking-widest mb-4 uppercase">Haydovchilarga e'lon</p>
                        <textarea id="bc-msg" class="w-full bg-black/50 border border-white/10 rounded-2xl p-4 text-sm mb-5 h-40 outline-none focus:border-yellow-500 transition-all" placeholder="Xabar matnini yozing..."></textarea>
                        <button onclick="sendBC()" class="w-full btn-primary py-4 uppercase tracking-[0.3em]">YUBORISH</button>
                    </div>`;
            } else {
                view.innerHTML = `<div class="py-20 text-center opacity-10 font-black text-xs">MA'LUMOT YO'Q</div>`;
            }
        }

        async function sendBC() {
            const msg = document.getElementById('bc-msg').value;
            if(!msg) return tg.showAlert('Xabarni kiriting!');

            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('📻 **ADMIN XABARI:**\n\n' + msg)}&parse_mode=Markdown`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                if(data.ok) {
                    tg.showAlert('Xabar yuborildi! ✅');
                    document.getElementById('bc-msg').value = '';
                } else {
                    tg.showAlert('Xatolik! ❌');
                }
            } catch(e) {
                tg.showAlert('Internet bilan bog\\'liq xatolik! ❌');
            }
        }

        render('a');
    </script>
</body>
</html>
