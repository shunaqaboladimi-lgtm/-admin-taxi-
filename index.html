<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weak Taxi - Boshqaruv Markazi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .taxi-yellow { color: #f2ba1d; }
        .bg-taxi-yellow { background-color: #f2ba1d; }
        .card { background: #121212; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-confirm { background: #f2ba1d; color: #000; font-weight: 800; border-radius: 18px; padding: 16px; width: 100%; text-transform: uppercase; }
        .active-tab { color: #f2ba1d; border-bottom: 2px solid #f2ba1d; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-5">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-2xl font-black tracking-tighter">ADMIN <span class="taxi-yellow">PRO</span></h1>
        <div class="h-10 w-10 card flex items-center justify-center"><i class="fa-solid fa-shield-halved text-yellow-500"></i></div>
    </div>

    <div id="main-view" class="space-y-6">
        <!-- Yuklanmoqda... -->
        <div class="py-20 text-center opacity-30"><i class="fa-solid fa-spinner animate-spin text-2xl"></i></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const token = '8899143978:AAEQcCgPHJkunL_kt31Vm8jhas8HpZKS-uQ';
        const groupId = '-1003713177314';

        // URL parametrlarini o'qish
        const params = new URLSearchParams(window.location.search);
        const appName = params.get('name');
        const appPhone = params.get('phone');
        const appCar = params.get('car');

        function render() {
            const box = document.getElementById('main-view');
            if (appName && appPhone) {
                box.innerHTML = `
                    <div class="card p-6 border-yellow-500/20 shadow-2xl">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1">Yangi haydovchi</p>
                                <h2 class="text-xl font-black uppercase">${appName}</h2>
                                <p class="text-sm text-yellow-500 font-bold">${appPhone}</p>
                            </div>
                            <span class="bg-yellow-500 text-black px-2 py-1 rounded text-[8px] font-black uppercase">URGENT</span>
                        </div>
                        <div class="bg-zinc-900/50 p-5 rounded-3xl border border-white/5 mb-8">
                            <p class="text-[10px] text-zinc-500 font-bold mb-2 uppercase tracking-tighter">Avtomobil ma'lumotlari:</p>
                            <p class="text-sm font-semibold italic text-zinc-200">"${appCar}"</p>
                        </div>
                        <button onclick="approve('${appName}','${appPhone}')" class="btn-confirm mb-3">TASDIQLASH</button>
                        <button onclick="tg.close()" class="w-full py-4 text-xs font-bold text-zinc-500 uppercase tracking-widest">BEKOR QILISH</button>
                    </div>`;
            } else {
                box.innerHTML = `
                    <div class="card p-8 text-center">
                        <i class="fa-solid fa-folder-open text-3xl opacity-10 mb-4"></i>
                        <p class="text-sm font-bold text-zinc-500 uppercase tracking-widest leading-loose">
                            Boshqaruv markaziga xush kelibsiz.<br>
                            Arizalarni tasdiqlash uchun botdagi tugmani bosing.
                        </p>
                    </div>`;
            }
        }

        async function approve(name, phone) {
            const msg = `✅ **TASDIQLANDI!**\n\nHaydovchi **${name}** (${phone}) admin tomonidan tekshirildi va tizimga muvaffaqiyatli qo'shildi! 🚕\n\n_Endi u buyurtmalarni qabul qilishi mumkin._`;
            try {
                const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${groupId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                if(res.ok) {
                    tg.showPopup({ title: 'Muvaffaqiyatli', message: 'Haydovchi tasdiqlandi!', buttons: [{type: 'close'}] });
                    tg.HapticFeedback.notificationOccurred('success');
                }
            } catch(e) { tg.showAlert('Xatolik yuz berdi!'); }
        }

        render();
    </script>
</body>
</html>
