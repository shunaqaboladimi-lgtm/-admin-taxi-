<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weak Taxi Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #000; color: white; font-family: -apple-system, sans-serif; }
        .taxi-yellow { color: #f2ba1d; }
        .bg-taxi-yellow { background-color: #f2ba1d; }
        .card { background-color: #1c1c1e; border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .tab-active { border-bottom: 3px solid #f2ba1d; color: #f2ba1d; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-black taxi-yellow leading-tight">ADMIN PANEL</h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Weak Taxi Management</p>
        </div>
        <div id="status-dot" class="h-2 w-2 bg-green-500 rounded-full animate-ping"></div>
    </div>

    <!-- Stats Card -->
    <div class="card bg-taxi-yellow text-black border-none shadow-[0_10px_20px_rgba(242,186,29,0.2)]">
        <p class="text-[10px] font-black opacity-50 uppercase tracking-tighter">Umumiy tushum</p>
        <h2 id="totalRevenue" class="text-4xl font-black tracking-tighter">0 so'm</h2>
        <div class="mt-4 pt-3 border-t border-black/10 flex justify-between items-end">
            <div>
                <p class="text-[9px] font-bold opacity-50 uppercase">Sizning foydangiz</p>
                <span id="adminProfit" class="text-lg font-black tracking-tight">0 so'm</span>
            </div>
            <div class="bg-black/10 px-2 py-1 rounded-lg">
                <span id="commissionRate" class="text-[10px] font-bold">10%</span>
            </div>
        </div>
    </div>

    <!-- Navigation Tabs -->
    <div class="flex space-x-6 mb-6 overflow-x-auto pb-2 sticky top-0 bg-black z-10 pt-2">
        <button onclick="showTab('drivers')" id="btn-drivers" class="tab-btn tab-active text-sm font-bold whitespace-nowrap">Haydovchilar</button>
        <button onclick="showTab('apps')" id="btn-apps" class="tab-btn text-gray-500 text-sm font-bold whitespace-nowrap">Arizalar</button>
        <button onclick="showTab('sos')" id="btn-sos" class="tab-btn text-gray-500 text-sm font-bold whitespace-nowrap">SOS</button>
        <button onclick="showTab('broadcast')" id="btn-broadcast" class="tab-btn text-gray-500 text-sm font-bold whitespace-nowrap">Xabar</button>
    </div>

    <!-- Content -->
    <div id="tab-content" class="pb-20">
        <div class="flex flex-col items-center justify-center py-20 opacity-20">
            <div class="h-8 w-8 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
        </div>
    </div>

    <script>
        // --- FIREBASE KONFIGURATSIYASI ---
        // Android ilovangizdagi Firebase ma'lumotlarini bu yerga qo'yishingiz shart!
        const firebaseConfig = {
            apiKey: "API_KALITINGIZNI_BU_YERGA_QO'YING",
            projectId: "PROYEKT_ID_NI_BU_YERGA_QO'YING",
            appId: "APP_ID_NI_BU_YERGA_QO'YING"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#000000';

        // Stats Listener
        db.collection("stats").doc("general").onSnapshot(doc => {
            if(doc.exists()){
                const data = doc.data();
                document.getElementById('totalRevenue').innerText = data.totalRevenue.toLocaleString() + " so'm";
                document.getElementById('adminProfit').innerText = data.adminProfit.toLocaleString() + " so'm";
                document.getElementById('commissionRate').innerText = (data.commissionRate || 10) + "%";
            }
        });

        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.className = "tab-btn text-gray-500 text-sm font-bold whitespace-nowrap");
            document.getElementById('btn-' + tab).className = "tab-btn tab-active text-sm font-bold whitespace-nowrap";

            const container = document.getElementById('tab-content');
            container.innerHTML = '<div class="py-20 flex justify-center opacity-20"><div class="h-6 w-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div></div>';

            if(tab === 'drivers') loadDrivers();
            else if(tab === 'apps') loadApps();
            else if(tab === 'sos') loadSOS();
            else if(tab === 'broadcast') loadBroadcast();
        }

        function loadDrivers() {
            db.collection("approved_drivers").onSnapshot(s => {
                let html = '';
                s.forEach(d => {
                    const data = d.data();
                    html += `<div class="card flex justify-between items-center animate-fade-in">
                        <div>
                            <p class="font-bold text-sm">${data.name}</p>
                            <p class="text-[10px] text-gray-500 font-medium">${data.phone} • ${data.carInfo}</p>
                            <p class="text-[9px] taxi-yellow font-bold mt-1 uppercase">Balans: ${data.balance.toLocaleString()} so'm</p>
                        </div>
                        <button onclick="deleteDriver('${data.phone}')" class="h-8 w-8 flex items-center justify-center bg-red-500/10 rounded-full text-red-500">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>`;
                });
                document.getElementById('tab-content').innerHTML = html || '<p class="text-center text-gray-600 py-10">Haydovchilar topilmadi</p>';
            });
        }

        function loadApps() {
            db.collection("applications").onSnapshot(s => {
                let html = '';
                s.forEach(d => {
                    const data = d.data();
                    html += `<div class="card">
                        <p class="font-bold text-sm">${data.name} (${data.phone})</p>
                        <p class="text-[10px] text-gray-500 mt-1">${data.carInfo}</p>
                        <div class="flex space-x-2 mt-4">
                            <button onclick="approveDriver('${data.phone}', '${data.name}', '${data.carInfo}')" class="flex-1 bg-white text-black py-2 rounded-xl font-black text-[10px] uppercase tracking-wider">Tasdiqlash</button>
                            <button onclick="rejectApp('${data.phone}')" class="bg-zinc-800 text-gray-400 px-4 py-2 rounded-xl font-bold text-[10px] uppercase">Rad etish</button>
                        </div>
                    </div>`;
                });
                document.getElementById('tab-content').innerHTML = html || '<p class="text-center text-gray-600 py-10">Yangi arizalar yo'q</p>';
            });
        }

        function loadSOS() {
            db.collection("sos").orderBy("date", "desc").onSnapshot(s => {
                let html = '';
                s.forEach(d => {
                    const data = d.data();
                    html += `<div class="card border-red-500/20 bg-red-500/5">
                        <div class="flex items-center space-x-2 mb-2">
                            <div class="h-2 w-2 bg-red-500 rounded-full animate-pulse"></div>
                            <p class="font-black text-xs text-red-500 uppercase">Yordam so'rovi</p>
                        </div>
                        <p class="font-bold text-sm">${data.userName}</p>
                        <p class="text-[10px] text-gray-400">${data.userPhone}</p>
                        <p class="text-[11px] mt-2 font-medium">📍 ${data.route}</p>
                        <p class="text-[9px] text-gray-600 mt-2">${data.date}</p>
                    </div>`;
                });
                document.getElementById('tab-content').innerHTML = html || '<p class="text-center text-gray-600 py-10">SOS signallari yo'q</p>';
            });
        }

        function loadBroadcast() {
            document.getElementById('tab-content').innerHTML = `
                <div class="card">
                    <p class="font-black text-xs uppercase taxi-yellow mb-4">Umumiy xabar yuborish</p>
                    <textarea id="bc-msg" class="w-full bg-black/50 border border-white/10 rounded-xl p-4 text-sm focus:border-yellow-500 outline-none h-32" placeholder="Xabaringizni yozing..."></textarea>
                    <button onclick="sendBC()" class="w-full bg-taxi-yellow text-black py-3 rounded-xl font-black text-xs uppercase tracking-widest mt-4">Xabarni tarqatish</button>
                </div>
            `;
        }

        // Actions
        function approveDriver(p, n, c) {
            db.collection("approved_drivers").doc(p).set({ name: n, phone: p, carInfo: c, balance: 0, rating: 5, totalTrips: 0 });
            db.collection("applications").doc(p).delete();
            db.collection("users").doc(p).update({ role: "Driver" });
            tg.HapticFeedback.notificationOccurred('success');
        }

        function deleteDriver(p) {
            if(confirm('Ushbu haydovchini o'chirmoqchimisiz?')) {
                db.collection("approved_drivers").doc(p).delete();
                db.collection("users").doc(p).update({ role: "User" });
            }
        }

        // Init
        showTab('drivers');
    </script>
</body>
</html>
