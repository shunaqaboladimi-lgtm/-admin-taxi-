<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WEAK CONTROL - ENTERPRISE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Space Grotesk', sans-serif; -webkit-tap-highlight-color: transparent; }
        .taxi-yellow { color: #f2ba1d; }
        .bg-taxi-yellow { background-color: #f2ba1d; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px); border-radius: 28px; }
        .active-tab { color: #f2ba1d; border-bottom: 2px solid #f2ba1d; }
        .btn-main { background: #f2ba1d; color: #000; font-weight: 700; border-radius: 18px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.97); opacity: 0.9; }
        @keyframes glow { 0% { box-shadow: 0 0 5px rgba(242, 186, 29, 0.2); } 50% { box-shadow: 0 0 20px rgba(242, 186, 29, 0.4); } 100% { box-shadow: 0 0 5px rgba(242, 186, 29, 0.2); } }
        .status-glow { animation: glow 3s infinite; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-6">
    <!-- TOP BAR -->
    <div class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-[10px] font-bold tracking-[0.4em] text-zinc-500 uppercase mb-1">Command Center</h1>
            <p class="text-2xl font-bold tracking-tighter">WEAK <span class="taxi-yellow underline decoration-zinc-800 underline-offset-8">PRO</span></p>
        </div>
        <button onclick="window.location.reload()" class="h-12 w-12 glass flex items-center justify-center">
            <i class="fa-solid fa-bolt taxi-yellow text-sm"></i>
        </button>
    </div>

    <!-- MAIN METRICS -->
    <div class="glass p-8 mb-8 relative overflow-hidden status-glow">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-yellow-500/5 rounded-full blur-3xl"></div>
        <p class="text-[10px] font-medium text-zinc-500 uppercase tracking-widest mb-2">Net Revenue Stream</p>
        <div class="flex items-end space-x-2 mb-8">
            <h2 class="text-4xl font-bold tracking-tighter">24,500,000</h2>
            <span class="text-[10px] font-bold text-zinc-600 mb-2">UZS</span>
        </div>
        <div class="grid grid-cols-2 gap-8 border-t border-white/5 pt-8">
            <div>
                <p class="text-[8px] font-bold text-zinc-500 uppercase mb-1">Company Profit</p>
                <p class="text-xl font-bold taxi-yellow tracking-tight">2,450,000 <span class="text-[8px]">sum</span></p>
            </div>
            <div class="text-right">
                <p class="text-[8px] font-bold text-zinc-500 uppercase mb-1">Active Fleet</p>
                <p class="text-xl font-bold text-white tracking-tight">32 <span class="text-[8px]">UNITS</span></p>
            </div>
        </div>
    </div>

    <!-- NAVIGATION -->
    <div class="flex space-x-8 mb-8 border-b border-white/5 pb-2 sticky top-0 bg-black/50 backdrop-blur-xl z-50">
        <button onclick="tab('a')" id="ta" class="active-tab text-[11px] font-bold tracking-widest pb-3">APPS</button>
        <button onclick="tab('d')" id="td" class="text-zinc-500 text-[11px] font-bold tracking-widest pb-3 uppercase">Fleet</button>
        <button onclick="tab('s')" id="ts" class="text-zinc-500 text-[11px] font-bold tracking-widest pb-3 uppercase">Alerts</button>
        <button onclick="tab('h')" id="th" class="text-zinc-500 text-[11px] font-bold tracking-widest pb-3 uppercase">Support</button>
    </div>

    <!-- CONTENT BOX -->
    <div id="view" class="space-y-4 pb-32"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function tab(t) {
            document.querySelectorAll('button').forEach(b => b.className = "text-zinc-500 text-[11px] font-bold tracking-widest pb-3 uppercase");
            document.getElementById('t'+t).className = "active-tab text-[11px] font-bold tracking-widest pb-3 uppercase";
            render(t);
            tg.HapticFeedback.impactOccurred('medium');
        }

        function render(t) {
            const box = document.getElementById('view');
            if(t === 'a') {
                box.innerHTML = `
                    <div class="glass p-6 border-yellow-500/10 bg-yellow-500/[0.02]">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <p class="font-bold text-base tracking-tight uppercase">Sohibjon Ergashev</p>
                                <p class="text-[10px] text-zinc-500 font-medium">+998 94 555 44 33</p>
                            </div>
                            <span class="text-[9px] bg-yellow-500 text-black px-3 py-1 rounded-full font-black tracking-tighter">NEW HUB</span>
                        </div>
                        <div class="bg-black/60 p-5 rounded-3xl border border-white/5 mb-6">
                            <p class="text-[10px] text-zinc-500 uppercase font-bold mb-2">Hardware Info</p>
                            <p class="text-xs text-zinc-200 font-medium italic">"Chevrolet Cobalt, 2024, To'q ko'k, 01 A 001 AA. Tajriba: 12 yil."</p>
                        </div>
                        <div class="flex space-x-3">
                            <button onclick="tg.showAlert('Node Integrated')" class="flex-1 btn-main py-4 text-[10px] uppercase tracking-widest">Authorize</button>
                            <button onclick="tg.showAlert('Terminated')" class="px-8 glass text-[10px] font-bold text-red-500">Decline</button>
                        </div>
                    </div>`;
            } else if(t === 'h') {
                box.innerHTML = `
                    <div class="glass p-8 text-center">
                        <div class="h-20 w-20 bg-yellow-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i class="fa-solid fa-headset taxi-yellow text-2xl"></i>
                        </div>
                        <h3 class="font-bold text-lg mb-2">Texnik Yordam</h3>
                        <p class="text-xs text-zinc-500 mb-8 leading-relaxed px-4">Muammo yoki savollar bo'lsa, quyidagi raqamga qo'ng'iroq qiling:</p>
                        <a href="tel:+998200000898" class="block w-full btn-main py-4 text-sm font-bold tracking-widest mb-4">+998 20 000 08 98</a>
                        <button onclick="tg.openTelegramLink('https://t.me/mirzou1ug')" class="w-full glass py-4 text-xs font-bold uppercase tracking-widest">Telegram Chat</button>
                    </div>`;
            } else if(t === 'd') {
                box.innerHTML = `
                    <div class="glass p-5 flex justify-between items-center">
                        <div class="flex items-center space-x-5">
                            <div class="h-12 w-12 bg-zinc-900 rounded-2xl flex items-center justify-center border border-white/5"><i class="fa-solid fa-user-ninja taxi-yellow"></i></div>
                            <div><p class="font-bold text-sm">Alisher V.</p><p class="text-[10px] text-zinc-500 uppercase">Gentra White | 01 Z 777 ZZ</p></div>
                        </div>
                        <p class="text-xs font-black taxi-glow">720,000</p>
                    </div>`;
            } else {
                box.innerHTML = `<div class="py-32 text-center opacity-10 font-bold text-[10px] tracking-[0.5em] uppercase">No incoming packets</div>`;
            }
        }
        render('a');
    </script>
</body>
</html>
