<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weak Taxi Admin - Live Control</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --tg-theme-bg-color: #000000; --tg-theme-text-color: #ffffff; --taxi-yellow: #f2ba1d; }
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .taxi-yellow { color: var(--taxi-yellow); }
        .bg-taxi-yellow { background-color: var(--taxi-yellow); }
        .card { background: #1c1c1e; border-radius: 24px; padding: 20px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-btn { color: #8e8e93; font-weight: 800; font-size: 12px; letter-spacing: 1px; padding: 12px 0; border-bottom: 2px solid transparent; transition: all 0.3s; }
        .tab-active { color: var(--taxi-yellow); border-bottom-color: var(--taxi-yellow); }
        .btn-approve { background: #fff; color: #000; border-radius: 14px; font-weight: 900; padding: 10px; font-size: 11px; }
        .btn-reject { background: #2c2c2e; color: #ff453a; border-radius: 14px; font-weight: 800; padding: 10px; font-size: 11px; }
        .badge { background: rgba(242, 186, 29, 0.1); color: var(--taxi-yellow); padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-list { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="p-4">
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
        <div>
            <h1 class="text-2xl font-black taxi-yellow tracking-tighter">WEAK ADMIN</h1>
            <div class="flex items-center space-x-1.5 mt-0.5">
                <span class="h-1.5 w-1.5 bg-green-500 rounded-full"></span>
                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Live Sync Enabled</p>
            </div>
        </div>
        <button onclick="window.location.reload()" class="h-10 w-10 bg-zinc-900 rounded-full flex items-center justify-center border border-white/10">
            <i class="fa-solid fa-rotate-right text-xs"></i>
        </button>
    </div>

    <!-- Stats Panel -->
    <div class="card bg-taxi-yellow text-black border-none shadow-[0_20px_50px_rgba(242,186,29,0.2)] mb-8">
        <div class="flex justify-between items-start">
            <div>
                <p class="text-[10px] font-black opacity-40 uppercase tracking-widest">Kassa holati</p>
                <h2 id="totalRev" class="text-4xl font-black tracking-tight mt-1">4,250,000</h2>
                <p class="text-[10px] font-bold opacity-30 mt-1 uppercase">So'm (Bugun)</p>
            </div>
            <div class="h-12 w-12 bg-black/10 rounded-2xl flex items-center justify-center">
                <i class="fa-solid fa-wallet text-xl"></i>
            </div>
        </div>
        <div class="mt-6 pt-5 border-t border-black/5 flex justify-between items-center">
            <div>
                <p class="text-[9px] font-bold opacity-40 uppercase">Sizning ulushingiz</p>
                <span class="text-xl font-black tracking-tighter">425,000 sum</span>
            </div>
            <div class="text-right">
                <p class="text-[9px] font-bold opacity-40 uppercase">Komissiya</p>
                <span class="text-xl font-black tracking-tighter">10%</span>
            </div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="flex space-x-8 mb-6 border-b border-white/5 sticky top-0 bg-black z-50 pt-2">
        <button onclick="show('drivers')" id="t-drivers" class="tab-btn tab-active flex-1">DRIVERS</button>
        <button onclick="show('apps')" id="t-apps" class="tab-btn flex-1">APPS <span id="app-count" class="ml-1 bg-red-500 text-white px-1.5 py-0.5 rounded-md text-[8px]">2</span></button>
        <button onclick="show('sos')" id="t-sos" class="tab-btn flex-1">SOS</button>
        <button onclick="show('radio')" id="t-radio" class="tab-btn flex-1">RADIO</button>
    </div>

    <!-- Content -->
    <div id="main-content" class="space-y-4 pb-20"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#000000';
        tg.backgroundColor = '#000000';

        // Mock Data for Demo
        const data = {
            drivers: [
                { name: "Sardor Azimov", tel: "+998 90 123 45 67", car: "Chevrolet Nexia 3 (Oq)", balance: "120,000" },
                { name: "Jamshid Karimov", tel: "+998 93 456 78 90", car: "Chevrolet Cobalt (To'q ko'k)", balance: "85,000" }
            ],
            apps: [
                { name: "Alisher Uzoqov", tel: "+998 99 888 77 66", car: "Gentra 2024, Oq, 01 A 777 AA" },
                { name: "Zafar Toirov", tel: "+998 97 111 22 33", car: "Nexia 2, Kulrang, 10 B 123 CA" }
            ],
            sos: [
                { name: "Mirzoulug'", tel: "+998 90 000 11 22", loc: "Yangiyer ➔ Toshkent", time: "12:45" }
            ]
        };

        function show(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('t-' + tab).classList.add('tab-active');

            const box = document.getElementById('main-content');
            let html = '';

            if (tab === 'drivers') {
                data.drivers.forEach(d => {
                    html += `
                    <div class="card animate-list">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center space-x-4">
                                <div class="h-12 w-12 bg-zinc-800 rounded-full flex items-center justify-center font-black text-lg taxi-yellow">${d.name[0]}</div>
                                <div>
                                    <p class="font-black text-sm uppercase tracking-tighter">${d.name}</p>
                                    <p class="text-[10px] text-gray-500 font-bold">${d.tel}</p>
                                    <p class="text-[9px] text-gray-600 mt-0.5">${d.car}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <p class="text-[11px] font-black taxi-yellow">${d.balance} sum</p>
                                <button class="text-[9px] text-red-500/50 font-black mt-1 uppercase">O'chirish</button>
                            </div>
                        </div>
                    </div>`;
                });
            } else if (tab === 'apps') {
                data.apps.forEach(a => {
                    html += `
                    <div class="card animate-list">
                        <div class="flex justify-between mb-4">
                            <div>
                                <p class="font-black text-sm uppercase">${a.name}</p>
                                <p class="text-[10px] text-gray-500">${a.tel}</p>
                            </div>
                            <div class="badge">NEW</div>
                        </div>
                        <div class="bg-black/40 p-4 rounded-2xl border border-white/5 mb-4">
                            <p class="text-[11px] text-gray-300 italic font-medium leading-relaxed">"${a.car}"</p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="action('tasdiq')" class="flex-1 btn-approve">TASDIQLASH</button>
                            <button onclick="action('rad')" class="btn-reject px-6">RAD ETISH</button>
                        </div>
                    </div>`;
                });
            } else if (tab === 'sos') {
                data.sos.forEach(s => {
                    html += `
                    <div class="card border-red-500/20 bg-red-500/5 animate-list">
                        <div class="flex items-center space-x-2 mb-3">
                            <div class="h-2 w-2 bg-red-500 rounded-full animate-ping"></div>
                            <p class="font-black text-[10px] text-red-500 uppercase tracking-widest">Yordam kerak</p>
                        </div>
                        <p class="font-black text-base">${s.name}</p>
                        <p class="text-[10px] text-gray-500 mb-4">${s.tel}</p>
                        <div class="bg-red-500/10 p-3 rounded-xl">
                            <p class="text-[11px] font-bold text-red-200">📍 ${s.loc}</p>
                        </div>
                        <p class="text-[9px] text-gray-700 mt-4 font-bold text-right uppercase tracking-widest">${s.time}</p>
                    </div>`;
                });
            } else if (tab === 'radio') {
                html = `
                <div class="card animate-list border-taxi-yellow/20">
                    <p class="font-black text-[10px] uppercase taxi-yellow tracking-widest mb-4">Radio tarqatish</p>
                    <textarea class="w-full bg-black/40 border border-white/5 rounded-2xl p-4 text-sm text-gray-200 outline-none h-40 focus:border-taxi-yellow/50 transition-all" placeholder="Barcha haydovchilarga e'lon yozing..."></textarea>
                    <button onclick="action('xabar yuborildi')" class="w-full bg-taxi-yellow text-black py-4 rounded-2xl font-black text-xs uppercase tracking-[3px] mt-4 shadow-lg shadow-taxi-yellow/10">YUBORISH</button>
                </div>`;
            }

            box.innerHTML = html || '<div class="text-center py-20 opacity-20 font-bold">BO\'SH</div>';
            tg.HapticFeedback.impactOccurred('light');
        }

        function action(msg) {
            tg.showPopup({ title: 'Muvaffaqiyatli', message: msg, buttons: [{type: 'ok'}] });
            tg.HapticFeedback.notificationOccurred('success');
        }

        show('drivers');
    </script>
</body>
</html>
