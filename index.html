<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weak Taxi - Admin Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        .taxi-yellow { color: #f2ba1d; }
        .bg-taxi-yellow { background-color: #f2ba1d; }
        .card { background: #111; border-radius: 28px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .btn-confirm { background: #f2ba1d; color: #000; font-weight: 800; border-radius: 20px; padding: 18px; width: 100%; font-size: 13px; text-transform: uppercase; box-shadow: 0 10px 20px rgba(242,186,29,0.15); }
        .btn-confirm:active { transform: scale(0.97); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="p-6">
    <div class="flex justify-between items-center mb-10">
        <div>
            <h1 class="text-2xl font-black tracking-tighter">BOSHQARUV</h1>
            <p class="text-[10px] taxi-yellow font-bold uppercase tracking-[0.3em]">Weak Taxi System</p>
        </div>
        <div class="h-10 w-10 bg-zinc-900 rounded-full flex items-center justify-center border border-white/5"><i class="fa-solid fa-crown text-yellow-500 text-xs"></i></div>
    </div>

    <div id="view" class="space-y-6">
        <!-- Loader -->
        <div class="py-20 text-center opacity-20"><i class="fa-solid fa-circle-notch animate-spin text-3xl"></i></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const token = '8899143978:AAEQcCgPHJkunL_kt31Vm8jhas8HpZKS-uQ';
        const groupId = '-1003713177314';

        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const phone = params.get('phone');
        const car = params.get('car');

        function render() {
            const box = document.getElementById('view');
            if (name && phone) {
                box.innerHTML = `
                    <div class="card p-8 animate">
                        <div class="flex justify-between items-start mb-8">
                            <div>
                                <p class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1">Yangi haydovchi</p>
                                <h2 class="text-2xl font-black uppercase tracking-tight">${name}</h2>
                                <p class="text-sm text-yellow-500 font-bold mt-1">${phone}</p>
                            </div>
                            <span class="bg-yellow-500/10 text-yellow-500 px-3 py-1 rounded-full text-[9px] font-black uppercase">Active</span>
                        </div>

                        <div class="bg-zinc-900/50 p-6 rounded-[24px] border border-white/5 mb-8">
                            <p class="text-[9px] text-zinc-600 font-bold mb-2 uppercase tracking-widest">Transport vositasi:</p>
                            <p class="text-sm font-bold text-zinc-200 leading-relaxed italic">"${car}"</p>
                        </div>

                        <button onclick="approve('${name}','${phone}')" id="btn" class="btn-confirm">HAYDOVCHINI TASDIQLASH</button>
                        <button onclick="tg.close()" class="w-full py-4 text-[10px] font-bold text-zinc-600 uppercase tracking-[0.3em] mt-2">Bekor qilish</button>
                    </div>`;
            } else {
                box.innerHTML = `
                    <div class="card p-10 text-center animate">
                        <div class="h-16 w-16 bg-zinc-900 rounded-3xl flex items-center justify-center mx-auto mb-6 border border-white/5">
                            <i class="fa-solid fa-folder-open text-yellow-500/30 text-xl"></i>
                        </div>
                        <h3 class="font-black text-sm uppercase tracking-widest mb-3">Arizalar yo'q</h3>
                        <p class="text-[11px] text-zinc-500 leading-relaxed font-medium uppercase tracking-tighter">
                            Haydovchilarni tasdiqlash uchun botga kelgan xabardagi "TASDIQLASH" tugmasini bosing.
                        </p>
                    </div>`;
            }
        }

        async function approve(n, p) {
            const btn = document.getElementById('btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-circle-notch animate-spin"></i>';

            const msg = `✅ **HAYDOVCHI TASDIQLANDI!**\n\n👤 **Ism:** ${n}\n📞 **Tel:** ${p}\n\n_Ushbu haydovchi endi tizimda buyurtmalarni qabul qilishi mumkin._`;

            try {
                const res = await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${groupId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                if(res.ok) {
                    tg.showPopup({ title: 'Muvaffaqiyatli', message: 'Haydovchi tizimga qo\'shildi!', buttons: [{type: 'close'}] });
                    tg.HapticFeedback.notificationOccurred('success');
                }
            } catch(e) {
                tg.showAlert('Xatolik yuz berdi! Internetni tekshiring.');
                btn.disabled = false;
                btn.innerText = 'HAYDOVCHINI TASDIQLASH';
            }
        }

        render();
    </script>
</body>
</html>
