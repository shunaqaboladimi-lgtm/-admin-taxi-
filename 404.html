<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Weak Admin Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .taxi-yellow { color: #f2ba1d; }
        .bg-taxi-yellow { background-color: #f2ba1d; }
        .card { background: #111; border-radius: 20px; padding: 18px; border: 1px solid rgba(255,255,255,0.05); }
        .active-tab { color: #f2ba1d; border-bottom: 2px solid #f2ba1d; }
        button:active { transform: scale(0.96); transition: 0.1s; }
    </style>
</head>
<body class="p-4">
    <div id="loader" class="fixed inset-0 bg-black z-[100] flex items-center justify-center">
        <div class="w-10 h-10 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-xl font-black taxi-yellow italic">WEAK ADMIN PRO</h1>
        <div class="bg-zinc-900 px-3 py-1 rounded-full border border-white/5">
            <span class="text-[9px] font-bold text-green-500 uppercase tracking-tighter">● Online System</span>
        </div>
    </div>

    <!-- Stats -->
    <div class="card bg-taxi-yellow text-black border-none mb-6">
        <div class="flex justify-between">
            <p class="text-[10px] font-black opacity-40 uppercase">Balansimiz</p>
            <i class="fa-solid fa-bolt-lightning opacity-20"></i>
        </div>
        <h2 class="text-3xl font-black mt-1 tracking-tighter">7,420,000 UZS</h2>
        <div class="mt-4 flex justify-between text-[10px] font-bold border-t border-black/5 pt-3">
            <span>ADMIN: 742,000</span>
            <span>RATIO: 10%</span>
        </div>
    </div>

    <!-- Tabs -->
    <div class="flex space-x-6 mb-6 overflow-x-auto border-b border-white/5 pb-1 no-scrollbar">
        <button onclick="tab('d')" id="td" class="active-tab pb-2 text-xs font-black">HAYDOVCHILAR</button>
        <button onclick="tab('a')" id="ta" class="text-zinc-500 pb-2 text-xs font-black">ARIZALAR</button>
        <button onclick="tab('s')" id="ts" class="text-zinc-500 pb-2 text-xs font-black">SOS</button>
        <button onclick="tab('r')" id="tr" class="text-zinc-500 pb-2 text-xs font-black">E'LON</button>
    </div>

    <div id="list" class="space-y-3"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        window.onload = () => document.getElementById('loader').style.display = 'none';

        const drivers = [
            {n: "Sanjar", t: "+998 90 111 22 33", c: "Gentra Qora", b: "450,000"},
            {n: "Otabek", t: "+998 93 444 55 66", c: "Cobalt Oq", b: "125,000"}
        ];

        function tab(t) {
            document.querySelectorAll('button').forEach(b => b.className = "text-zinc-500 pb-2 text-xs font-black");
            document.getElementById('t'+t).className = "active-tab pb-2 text-xs font-black";
            render(t);
            tg.HapticFeedback.impactOccurred('light');
        }

        function render(t) {
            const list = document.getElementById('list');
            list.innerHTML = '';
            if(t === 'd') {
                drivers.forEach(i => {
                    list.innerHTML += `<div class="card flex justify-between items-center">
                        <div><p class="font-black text-sm uppercase">${i.n}</p><p class="text-[10px] text-zinc-500">${i.t}</p></div>
                        <div class="text-right"><p class="text-xs font-black taxi-yellow">${i.b}</p></div>
                    </div>`;
                });
            } else if(t === 'r') {
                list.innerHTML = `<div class="card"><textarea class="w-full bg-transparent border border-white/10 rounded-xl p-4 text-sm mb-4 h-32" placeholder="Xabar matni..."></textarea>
                <button onclick="tg.showAlert('Yuborildi')" class="w-full bg-taxi-yellow text-black py-4 rounded-xl font-black text-xs uppercase">TARQATISH</button></div>`;
            } else {
                list.innerHTML = `<div class="py-20 text-center opacity-20 font-black text-xs uppercase">Ma'lumot yo'q</div>`;
            }
        }
        render('d');
    </script>
</body>
</html>
